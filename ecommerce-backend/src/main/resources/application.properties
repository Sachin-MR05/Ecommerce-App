spring.application.name=ecommerce-backend
server.port=8080

# Paths to the JSON "database" files (relative to project root when run via mvn spring-boot:run)
app.data.products-file=src/main/resources/data/products.json
app.data.cart-file=src/main/resources/data/cart.json

# Pretty error messages instead of default whitelabel page
server.error.include-message=always

logging.level.com.ecommerce=DEBUG